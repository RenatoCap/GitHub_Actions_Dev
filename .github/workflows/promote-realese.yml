name: Promote Release to Latest

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leer versión
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Promover release
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.version.outputs.version }}"
            const owner = context.repo.owner
            const repo = context.repo.repo
            const tag = `v${version}`

            try {
              const { data: release } =
                await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag
                })

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                prerelease: false,
                draft: false,
                make_latest: "true"
              })

              core.info(`✅ Release ${tag} promovido a Latest`)
            } catch (error) {
              core.setFailed(`❌ No se encontró release para ${tag}`)
            }