name: Update investments daily

on:
  schedule:
    - cron: '0 1 * * *' # Runs at 01:00 UTC daily
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase RPC to update all users investments
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secrets" >&2
            exit 1
          fi

          echo "Calling Supabase RPC update_all_users_investment_values..."
          curl -s -X POST "${SUPABASE_URL}/rest/v1/rpc/update_all_users_investment_values" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' --fail

          echo "RPC call finished"
