name: Release from Milestone (PRO)

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  release:
    if: github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =============================
      # 1️⃣ Leer versión
      # =============================
      - name: Leer versión
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # =============================
      # 2️⃣ Validar SemVer
      # =============================
      - name: Validar SemVer
        run: |
          if [[ ! "${{ steps.version.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ VERSION no cumple SemVer (X.Y.Z)"
            exit 1
          fi

      # =============================
      # 3️⃣ Verificar que no exista versión
      # =============================
      - name: Verificar versión única
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          BRANCH="release/v$VERSION"

          git fetch --all --tags

          if git tag -l | grep -q "^$TAG$"; then
            echo "❌ Ya existe el tag $TAG"
            exit 1
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "❌ Ya existe la rama $BRANCH"
            exit 1
          fi

      # =============================
      # 4️⃣ Analizar milestone
      # =============================
      - name: Analizar milestone
        id: milestone
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.version.outputs.version }}"
            const owner = context.repo.owner
            const repo = context.repo.repo

            const { data: milestones } =
              await github.rest.issues.listMilestones({
                owner, repo, state: "open"
              })

            const milestone = milestones.find(m =>
              m.title.startsWith(`v${version.slice(0,3)}`)
            )

            if (!milestone) {
              core.setFailed("❌ No se encontró milestone para esta versión")
              return
            }

            const { data: issues } =
              await github.rest.issues.listForRepo({
                owner,
                repo,
                milestone: milestone.number,
                state: "all",
                per_page: 100
              })

            const total = issues.length
            const closed = issues.filter(i => i.state === "closed").length
            const open = total - closed
            const percent = Math.round((closed / total) * 100)

            const barCount = Math.round(percent / 10)
            const bar =
              "🟩".repeat(barCount) + "⬜".repeat(10 - barCount)

            const openList = issues
              .filter(i => i.state === "open")
              .map(i => `- #${i.number} ${i.title}`)
              .join("\n") || "Ninguna 🎉"

            core.setOutput("title", milestone.title)
            core.setOutput("description", milestone.description || "")
            core.setOutput("percent", percent)
            core.setOutput("bar", bar)
            core.setOutput("openList", openList)

            if (percent !== 100) {
              core.setFailed(`❌ Milestone incompleto (${percent}%)`)
            } else {
              core.setOutput("complete", true)
            }

      # =============================
      # 5️⃣ Comentar en PR
      # =============================
      - name: Comentar en PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
            ## 🚀 Release ${process.env.TITLE}

            **Progreso:** ${process.env.PERCENT}%

            ${process.env.BAR}

            ### 📋 Issues abiertas
            ${process.env.OPENLIST}

            ---

            ### 📝 Descripción del milestone
            ${process.env.DESCRIPTION}
            `

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })
        env:
          TITLE: ${{ steps.milestone.outputs.title }}
          DESCRIPTION: ${{ steps.milestone.outputs.description }}
          PERCENT: ${{ steps.milestone.outputs.percent }}
          BAR: ${{ steps.milestone.outputs.bar }}
          OPENLIST: ${{ steps.milestone.outputs.openList }}

      # =============================
      # 6️⃣ Crear release (solo si todo OK)
      # =============================
      - name: Crear rama y tag
        if: steps.milestone.outputs.complete == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v$VERSION"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout -b $BRANCH
          git push origin $BRANCH

          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Crear GitHub Release
        if: steps.milestone.outputs.complete == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.milestone.outputs.description }}
          prerelease: true